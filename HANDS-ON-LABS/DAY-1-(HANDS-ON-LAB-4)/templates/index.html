<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="status-indicator"></div>
            <div>
                <h2>Support Assistant</h2>
                <p>Powered by Multi-Pattern AI</p>
            </div>
        </header>

        <div class="chat-history">
            {% if query %}
            <div class="message user-message">
                <div class="avatar user-avatar">U</div>
                <div class="bubble user-bubble">
                    {{ query }}
                </div>
            </div>
            {% endif %}

            {% if pattern and response %}
            <div class="message ai-message fade-in">
                <div class="avatar ai-avatar">AI</div>
                <div class="bubble ai-bubble">
                    <div class="tag-badge">{{ pattern }} Match</div>
                    <div class="response-text">{{ response }}</div>
                </div>
            </div>
            {% endif %}
            
            <div class="typing-indicator" id="typingIndicator" style="display: none;">
                <span></span><span></span><span></span>
            </div>
        </div>

        <form method="post" class="chat-input-wrapper" id="chatForm">
            <input type="text" name="query" placeholder="Type your issue (e.g. 'I need a refund')" required autocomplete="off">
            <button type="submit" id="sendBtn">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('chatForm').addEventListener('submit', function() {
            document.getElementById('typingIndicator').style.display = 'flex';
        });
    </script>
</body>
</html>
