<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>ReAct Web Agent</h1>
        </header>

        <main id="chatbox">
            <div class="message ai-message">
                Hello! I am a reasoning AI with web search capabilities. Ask me a factual question!
            </div>
            <!-- Chat elements will be dynamically injected here by JS -->
        </main>

        <div class="input-container">
            <input type="text" id="promptInput" placeholder="Ask a question..." autocomplete="off">
            <button id="submitBtn">Send</button>
        </div>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
