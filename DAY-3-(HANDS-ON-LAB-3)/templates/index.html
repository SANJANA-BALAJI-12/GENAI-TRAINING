<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Content | AI Moderation System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f111a;
            --surface-color: #1a1d2d;
            --surface-border: #2a2e45;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --primary-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .glass-container {
            width: 100%;
            max-width: 600px;
            background: rgba(26, 29, 45, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            transform: translateY(0);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }

        .glass-container:hover {
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6), 0 0 40px var(--primary-glow);
        }

        .header {
            padding: 2.5rem 2.5rem 1.5rem;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 2.5rem;
            right: 2.5rem;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.05rem;
            font-weight: 300;
        }

        .content {
            padding: 2rem 2.5rem 2.5rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 2rem;
        }

        textarea {
            width: 100%;
            background: rgba(15, 17, 26, 0.6);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            padding: 1.25rem;
            color: var(--text-main);
            font-size: 1rem;
            resize: vertical;
            min-height: 140px;
            transition: all 0.3s ease;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            background: rgba(15, 17, 26, 0.8);
        }

        textarea::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            padding: 1.25rem;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        .submit-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: left 0.6s ease;
            pointer-events: none;
        }

        .submit-btn:hover::after {
            left: 100%;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert-box {
            display: none;
            margin-bottom: 2rem;
            padding: 1.25rem;
            border-radius: 12px;
            background: rgba(15, 17, 26, 0.8);
            border-left: 4px solid transparent;
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .alert-box.success { border-left-color: var(--success); }
        .alert-box.error { border-left-color: var(--error); }
        .alert-box.warning { border-left-color: var(--warning); }

        .alert-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
            font-size: 1.1rem;
        }
        
        .success .alert-title { color: var(--success); }
        .error .alert-title { color: var(--error); }
        .warning .alert-title { color: var(--warning); }

        .alert-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .review-link {
            display: none;
            margin-top: 1rem;
            color: var(--warning);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }

        .review-link:hover {
            color: #d97706;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <div class="header">
            <h1>Nexus | Ingestion</h1>
            <p>Enter text payload for real-time neural moderation.</p>
        </div>
        
        <div class="content">
            <div id="alert-container" class="alert-box">
                <h3 id="alert-title" class="alert-title"></h3>
                <p id="alert-desc" class="alert-desc"></p>
                <a id="review-link" href="#" class="review-link">Action Required: Open Review Dashboard &rarr;</a>
            </div>

            <form id="submit-form">
                <div class="input-group">
                    <textarea 
                        id="text" 
                        name="text" 
                        required
                        placeholder="Initialize sequence... (Type content here)"></textarea>
                </div>
                <button type="submit" id="submit-btn" class="submit-btn">
                    <span id="btn-text">Execute AI Analysis</span>
                    <div id="spinner" class="spinner"></div>
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('submit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btn-text');
            const textValue = document.getElementById('text').value;
            const container = document.getElementById('alert-container');
            const reviewLink = document.getElementById('review-link');
            
            btn.disabled = true;
            spinner.style.display = 'block';
            btnText.innerText = 'Processing...';
            container.style.display = 'none';
            reviewLink.style.display = 'none';

            try {
                const res = await fetch('/moderate/submit', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text: textValue})
                });
                
                const data = await res.json();
                
                const title = document.getElementById('alert-title');
                const desc = document.getElementById('alert-desc');
                
                // Reset Classes
                container.className = 'alert-box';
                container.style.display = 'block';
                
                if (data.status === 'APPROVED') {
                    container.classList.add('success');
                    title.innerText = 'Clearance Granted (Auto-Approved)';
                    desc.innerText = `Confidence Score: ${data.ai_score}\nReasoning: ${data.ai_reasoning}`;
                } else if (data.status === 'REJECTED') {
                    container.classList.add('error');
                    title.innerText = 'Protocol Violation (Auto-Rejected)';
                    desc.innerText = `Threat Level: ${data.ai_score}\nReasoning: ${data.ai_reasoning}`;
                } else if (data.status === 'PENDING_REVIEW' || data.status === 'PROCESSING') {
                    container.classList.add('warning');
                    title.innerText = 'Intervention Required (Ambiguous)';
                    desc.innerText = `Anomaly Level: ${data.ai_score}\nReasoning: ${data.ai_reasoning}`;
                    reviewLink.href = `/moderate/${data.job_id}/review`;
                    reviewLink.style.display = 'inline-block';
                } else {
                    title.innerText = 'System Error';
                    desc.innerText = 'Failed to interpret neural output.';
                }
                
            } catch (error) {
                alert('Fatal Error: Uplink disconnected.');
                console.error(error);
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
                btnText.innerText = 'Execute AI Analysis';
            }
        });
    </script>
</body>
</html>
